<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Secure Messenger Application">
    <title>Messenger</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    
    <!-- Preconnect to external resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2>🚀 Welcome to Messenger</h2>
            <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20" autocomplete="off">
            <button id="joinButton">Join Chat</button>
        </div>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>💬 Messenger</h1>
            <div class="users-list" id="usersList">Users: </div>
        </div>
        
        <div class="status disconnected" id="status">Connecting...</div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500" autocomplete="off">
            <button id="sendBtn">Send</button>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="js/app.js" defer></script>
</body>
</html>
