<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        
        .container {
            width: 100%;
            max-width: 800px;
            height: 80vh;
            max-height: 700px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        /* Адаптация для мобильных устройств */
        @media (max-width: 768px) {
            body {
                padding: 5px;
                align-items: flex-start;
            }
            
            .container {
                height: 90vh;
                max-height: none;
                border-radius: 8px;
            }
            
            .header h1 {
                font-size: 20px;
            }
            
            .users-list {
                font-size: 12px;
            }
            
            .message {
                max-width: 85%;
                padding: 8px 12px;
            }
            
            .message-text {
                font-size: 13px;
            }
            
            .input-area {
                padding: 10px;
                gap: 8px;
            }
            
            #messageInput {
                padding: 10px 12px;
                font-size: 16px; /* Предотвращает зум на iOS */
            }
            
            #sendBtn {
                padding: 10px 20px;
                font-size: 14px;
            }
            
            .login-box {
                padding: 30px 20px;
                max-width: 90%;
            }
            
            .login-box h2 {
                font-size: 20px;
            }
            
            .login-box input,
            .login-box button {
                font-size: 16px; /* Предотвращает зум на iOS */
                padding: 14px;
            }
        }
        
        /* Адаптация для маленьких экранов */
        @media (max-width: 480px) {
            .container {
                height: 95vh;
                border-radius: 6px;
            }
            
            .header {
                padding: 15px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .messages {
                padding: 15px;
            }
            
            .message {
                max-width: 90%;
                padding: 8px 10px;
            }
            
            .message-username {
                font-size: 11px;
            }
            
            .message-text {
                font-size: 12px;
            }
            
            .message-time {
                font-size: 10px;
            }
            
            .input-area {
                padding: 8px;
                flex-wrap: wrap;
            }
            
            #messageInput {
                min-width: calc(100% - 80px);
                border-radius: 20px;
            }
            
            #sendBtn {
                min-width: 70px;
                border-radius: 20px;
            }
        }
        
        /* Адаптация для планшетов */
        @media (min-width: 769px) and (max-width: 1024px) {
            .container {
                width: 85%;
                height: 85vh;
            }
        }
        
        /* Landscape ориентация на мобильных */
        @media (max-height: 500px) and (orientation: landscape) {
            body {
                padding: 5px;
            }
            
            .container {
                height: 95vh;
            }
            
            .header {
                padding: 10px 15px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .messages {
                padding: 10px;
            }
            
            .message {
                margin-bottom: 10px;
            }
        }
        
        .header {
            background: #667eea;
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .users-list {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 10px 15px;
            border-radius: 8px;
            max-width: 70%;
        }
        
        .message.chat {
            background: white;
            margin-right: auto;
        }
        
        .message.my-message {
            background: #667eea;
            color: white;
            margin-left: auto;
        }
        
        .message.system {
            background: #e0e0e0;
            text-align: center;
            max-width: 100%;
            font-style: italic;
            font-size: 13px;
        }
        
        .message-username {
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
            color: #667eea;
        }
        
        .my-message .message-username {
            color: white;
        }
        
        .message-text {
            font-size: 14px;
            line-height: 1.4;
        }
        
        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        
        #messageInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #messageInput:focus {
            border-color: #667eea;
        }
        
        #sendBtn {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        #sendBtn:hover {
            background: #5a6fd6;
        }
        
        .login-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        
        .login-box h2 {
            margin-bottom: 20px;
            color: #667eea;
        }
        
        .login-box input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        
        .hidden {
            display: none !important;
        }
        
        .status {
            padding: 10px;
            text-align: center;
            font-size: 13px;
        }
        
        .status.connected {
            background: #d4edda;
            color: #155724;
        }
        
        .status.disconnected {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2>🚀 Welcome to Messenger</h2>
            <input type="text" id="usernameInput" placeholder="Enter your username" maxlength="20">
            <button onclick="joinChat()">Join Chat</button>
        </div>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>💬 Messenger</h1>
            <div class="users-list" id="usersList">Users: </div>
        </div>
        
        <div class="status disconnected" id="status">Connecting...</div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message..." onkeypress="handleKeyPress(event)">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let ws;
        let username = '';
        
        function joinChat() {
            const input = document.getElementById('usernameInput');
            username = input.value.trim();
            
            if (!username) {
                alert('Please enter a username');
                return;
            }
            
            // Connect to WebSocket server
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.hostname}:8765`;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                document.getElementById('loginModal').classList.add('hidden');
                document.getElementById('status').textContent = 'Connected';
                document.getElementById('status').className = 'status connected';
                
                // Send join message
                ws.send(JSON.stringify({
                    action: 'join',
                    username: username
                }));
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                displayMessage(data);
            };
            
            ws.onclose = () => {
                document.getElementById('status').textContent = 'Disconnected - Reconnecting...';
                document.getElementById('status').className = 'status disconnected';
                setTimeout(() => location.reload(), 2000);
            };
            
            ws.onerror = () => {
                console.error('WebSocket error');
            };
        }
        
        function displayMessage(data) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            
            if (data.type === 'system') {
                msgDiv.className = 'message system';
                msgDiv.innerHTML = `<div class="message-text">${data.message}</div>`;
                if (data.users) {
                    document.getElementById('usersList').textContent = 'Users: ' + data.users.join(', ');
                }
            } else if (data.type === 'chat') {
                const isMyMessage = data.username === username;
                msgDiv.className = `message chat ${isMyMessage ? 'my-message' : ''}`;
                msgDiv.innerHTML = `
                    <div class="message-username">${data.username}</div>
                    <div class="message-text">${escapeHtml(data.message)}</div>
                    <div class="message-time">${new Date(data.timestamp).toLocaleTimeString()}</div>
                `;
            }
            
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message && ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    action: 'message',
                    message: message
                }));
                input.value = '';
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
