<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Безопасный Мессенджер</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 900px;
      height: 600px;
      display: flex;
      overflow: hidden;
    }
    .sidebar {
      width: 250px;
      background: #f8f9fa;
      border-right: 1px solid #e9ecef;
      padding: 20px;
      overflow-y: auto;
    }
    .sidebar h3 {
      color: #333;
      margin-bottom: 15px;
      font-size: 16px;
    }
    .user-item {
      padding: 10px;
      background: white;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
    }
    .user-item:hover {
      background: #e3f2fd;
    }
    .user-item.active {
      background: #667eea;
      color: white;
      border-color: #764ba2;
    }
    .user-item .status {
      font-size: 12px;
      color: #28a745;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    .header {
      padding: 20px;
      background: #667eea;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h2 {
      font-size: 18px;
    }
    .encryption-badge {
      background: #28a745;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      background: #f8f9fa;
    }
    .message {
      margin-bottom: 15px;
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      word-wrap: break-word;
    }
    .message.sent {
      background: #667eea;
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .message.received {
      background: white;
      color: #333;
      margin-right: auto;
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .message .meta {
      font-size: 11px;
      opacity: 0.7;
      margin-top: 5px;
    }
    .input-area {
      padding: 20px;
      background: white;
      border-top: 1px solid #e9ecef;
      display: flex;
      gap: 10px;
    }
    .input-area input {
      flex: 1;
      padding: 12px 20px;
      border: 2px solid #e9ecef;
      border-radius: 25px;
      outline: none;
      transition: border-color 0.3s;
    }
    .input-area input:focus {
      border-color: #667eea;
    }
    .input-area button {
      padding: 12px 30px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    .input-area button:hover {
      background: #764ba2;
      transform: translateY(-2px);
    }
    .login-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .login-box {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    .login-box h1 {
      color: #667eea;
      margin-bottom: 10px;
    }
    .login-box p {
      color: #666;
      margin-bottom: 20px;
    }
    .login-box input {
      width: 100%;
      padding: 15px;
      border: 2px solid #e9ecef;
      border-radius: 10px;
      margin-bottom: 15px;
      font-size: 16px;
    }
    .login-box button {
      width: 100%;
      padding: 15px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    .hidden {
      display: none !important;
    }
    .lock-icon {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <!-- Модальное окно входа -->
  <div id="loginModal" class="login-modal">
    <div class="login-box">
      <h1>🔐 Безопасный Мессенджер</h1>
      <p>End-to-End шифрование сообщений</p>
      <input type="text" id="usernameInput" placeholder="Введите ваше имя" maxlength="20">
      <button onclick="login()">Войти</button>
    </div>
  </div>

  <!-- Основной интерфейс -->
  <div class="container hidden" id="mainContainer">
    <div class="sidebar">
      <h3>👥 Пользователи онлайн</h3>
      <div id="userList"></div>
    </div>
    <div class="main">
      <div class="header">
        <h2 id="chatTitle">Выберите собеседника</h2>
        <div class="encryption-badge">
          <span class="lock-icon">🔒</span>
          <span>E2E Шифрование</span>
        </div>
      </div>
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input type="text" id="messageInput" placeholder="Введите сообщение..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Отправить</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
  <script>
    const socket = io();
    let currentUsername = '';
    let userId = null;
    let selectedUser = null;
    let userKeys = {}; // Хранилище публичных ключей пользователей
    let privateKey = null;
    let publicKey = null;

    // Генерация пары ключей RSA
    function generateKeyPair() {
      // Для простоты используем симметричное шифрование с общим секретом
      // В реальном приложении используйте асимметричное шифрование
      const secret = CryptoJS.lib.WordArray.random(32).toString();
      return {
        private: secret,
        public: CryptoJS.SHA256(secret).toString()
      };
    }

    // Шифрование сообщения
    function encryptMessage(message, recipientPublicKey) {
      // Используем AES шифрование
      const encrypted = CryptoJS.AES.encrypt(message, recipientPublicKey).toString();
      return encrypted;
    }

    // Дешифрование сообщения
    function decryptMessage(encryptedMessage, privateKey) {
      try {
        const bytes = CryptoJS.AES.decrypt(encryptedMessage, privateKey);
        return bytes.toString(CryptoJS.enc.Utf8);
      } catch (e) {
        console.error('Ошибка дешифрования:', e);
        return '[Ошибка дешифрования]';
      }
    }

    // Вход в систему
    function login() {
      const username = document.getElementById('usernameInput').value.trim();
      if (!username) {
        alert('Введите имя!');
        return;
      }

      currentUsername = username;
      
      // Генерируем ключи
      const keys = generateKeyPair();
      privateKey = keys.private;
      publicKey = keys.public;

      socket.emit('register', username);
      
      document.getElementById('loginModal').classList.add('hidden');
      document.getElementById('mainContainer').classList.remove('hidden');
    }

    // Обработка регистрации
    socket.on('registered', (id) => {
      userId = id;
      console.log('Зарегистрирован как:', userId);
      
      // Отправляем наш публичный ключ
      socket.emit('public-key', { publicKey });
      
      // Запрашиваем ключи других пользователей
      socket.emit('request-keys');
    });

    // Обновление списка пользователей
    socket.on('user-list', (users) => {
      const userListEl = document.getElementById('userList');
      userListEl.innerHTML = '';
      
      users.forEach(username => {
        if (username !== currentUsername) {
          const userEl = document.createElement('div');
          userEl.className = 'user-item';
          userEl.innerHTML = `
            <div>${username}</div>
            <div class="status">● Онлайн</div>
          `;
          userEl.onclick = () => selectUser(username, userEl);
          userListEl.appendChild(userEl);
        }
      });
    });

    // Получение публичного ключа пользователя
    socket.on('public-key', (data) => {
      console.log('Получен публичный ключ от:', data.username);
      userKeys[data.userId] = {
        username: data.username,
        publicKey: data.publicKey
      };
    });

    // Получение списка ключей
    socket.on('keys-list', (keys) => {
      console.log('Получены ключи:', keys);
      userKeys = keys;
    });

    // Выбор пользователя для чата
    function selectUser(username, element) {
      // Находим userId по username
      let targetUserId = null;
      for (const [uid, data] of Object.entries(userKeys)) {
        if (data.username === username) {
          targetUserId = uid;
          break;
        }
      }
      
      // Если ключа нет, ищем среди активных подключений
      if (!targetUserId) {
        // В реальном приложении нужно хранить маппинг username -> userId
        alert('Пользователь еще не обменялся ключами. Подождите немного.');
        return;
      }

      selectedUser = { username, userId: targetUserId };
      document.getElementById('chatTitle').textContent = `Чат с ${username}`;
      
      // Подсветка активного пользователя
      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
      element.classList.add('active');
      
      // Очищаем сообщения при переключении (в реальном приложении нужна история)
      document.getElementById('messages').innerHTML = '';
    }

    // Отправка сообщения
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const message = input.value.trim();
      
      if (!message || !selectedUser) {
        if (!selectedUser) alert('Выберите собеседника!');
        return;
      }

      // Получаем публичный ключ получателя
      const recipientKey = userKeys[selectedUser.userId]?.publicKey;
      if (!recipientKey) {
        alert('Нет ключа шифрования для этого пользователя');
        return;
      }

      // Шифруем сообщение
      const encryptedData = encryptMessage(message, recipientKey);

      // Отправляем зашифрованное сообщение
      socket.emit('encrypted-message', {
        to: selectedUser.userId,
        encryptedData: encryptedData
      });

      // Добавляем сообщение в чат
      addMessage(message, 'sent');
      input.value = '';
    }

    // Получение сообщения
    socket.on('message', (data) => {
      console.log('Получено сообщение от:', data.fromUsername);
      
      // Дешифруем сообщение нашим приватным ключом
      const decryptedMessage = decryptMessage(data.encryptedData, privateKey);
      
      addMessage(decryptedMessage, 'received', data.fromUsername, data.timestamp);
    });

    // Добавление сообщения в чат
    function addMessage(text, type, fromUsername = '', timestamp = new Date().toISOString()) {
      const messagesEl = document.getElementById('messages');
      const messageEl = document.createElement('div');
      messageEl.className = `message ${type}`;
      
      const time = new Date(timestamp).toLocaleTimeString('ru-RU', { 
        hour: '2-digit', 
        minute: '2-digit' 
      });
      
      messageEl.innerHTML = `
        <div>${text}</div>
        <div class="meta">${type === 'received' ? fromUsername : 'Вы'} • ${time}</div>
      `;
      
      messagesEl.appendChild(messageEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Отправка по Enter
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        sendMessage();
      }
    }

    // Обработка нажатия Enter в поле ввода имени
    document.getElementById('usernameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>
</body>
</html>
